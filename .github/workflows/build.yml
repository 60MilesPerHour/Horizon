name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: horizon-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Strip code-signing requirements (CI has no certificate)
        run: |
          /usr/bin/sed -i '' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            -e 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual;/g' \
            -e 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' \
            -e 's/"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "Apple Development";/"CODE_SIGN_IDENTITY[sdk=macosx*]" = "-";/g' \
            -e 's/ENABLE_HARDENED_RUNTIME = YES;/ENABLE_HARDENED_RUNTIME = NO;/g' \
            macos/Runner.xcodeproj/project.pbxproj

      - name: Build macOS (unsigned)
        run: flutter build macos --release
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"

      - name: Zip .app bundle
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent horizon.app ../../../../../horizon-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: horizon-macos
          path: horizon-macos.zip
          retention-days: 30

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libsqlite3-dev \
            imagemagick

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package .deb and tarball
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          chmod +x scripts/package-deb.sh
          scripts/package-deb.sh "$VERSION"
          ls -la horizon_*_amd64.deb horizon-*-linux-x64.tar.gz

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: horizon-linux
          path: |
            horizon_*_amd64.deb
            horizon-*-linux-x64.tar.gz
          retention-days: 30

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle Visual C++ runtime DLLs
        # horizon.exe is built against the dynamic MSVC runtime, so end users
        # without VC++ Redistributable installed see "MSVCP140.dll not found"
        # on launch. Copy the runtime DLLs from the GitHub-hosted MSVC install
        # into the Release directory before zipping.
        run: |
          $relDir = "build\windows\x64\runner\Release"
          $msvc = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022" -Recurse -Filter "Microsoft.VC*.CRT" -Directory -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match "x64\\Microsoft.VC.*\.CRT" -and $_.FullName -match "redist" } |
                  Select-Object -First 1
          if (-not $msvc) {
            Write-Error "Could not locate VC++ redistributable directory."
            exit 1
          }
          Write-Host "Copying VC++ runtime from $($msvc.FullName) to $relDir"
          Copy-Item "$($msvc.FullName)\msvcp140.dll" $relDir -Force
          Copy-Item "$($msvc.FullName)\vcruntime140.dll" $relDir -Force
          if (Test-Path "$($msvc.FullName)\vcruntime140_1.dll") {
            Copy-Item "$($msvc.FullName)\vcruntime140_1.dll" $relDir -Force
          }
          Get-ChildItem $relDir -Filter "*.dll" | Select-Object Name
        shell: pwsh

      - name: Zip runner folder
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath horizon-windows.zip
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: horizon-windows
          path: horizon-windows.zip
          retention-days: 30
